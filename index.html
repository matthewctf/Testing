<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米線數據紀錄</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; padding: 10px; display: none; }
    </style>
</head>
<body>
    <h2>米線傳送</h2>
    
    <div class="input-group">
        <label for="shopName">店名：</label>
        <input type="text" id="shopName" placeholder="例如：譚仔">
    </div>
    
    <div class="input-group">
        <label for="price">價錢：</label>
        <input type="number" id="price" placeholder="例如：55">
    </div>

    <button id="submitBtn">傳送到 Google Sheet</button>
    <div id="status"></div>

    <script>
        // 呢度已經更新咗你提供嘅新 URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbwY1fu9g3om-VhxdKcGxuEne-pgGZQkndDlqH1bifgaZ1_McT8xtkbKmKVuyau823wT6g/exec';

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const shopName = document.getElementById('shopName').value;
            const price = document.getElementById('price').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('submitBtn');

            if (!shopName || !price) {
                alert('請填寫完整數據');
                return;
            }

            btn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.innerText = '傳送中...';
            statusDiv.style.backgroundColor = '#fff3cd';

            try {
                // 使用 no-cors 模式解決跨網域問題
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shopName, price, timestamp: new Date().toLocaleString() })
                });

                statusDiv.innerText = '傳送成功！(請檢查 Google Sheet)';
                statusDiv.style.backgroundColor = '#d4edda';
                document.getElementById('shopName').value = '';
                document.getElementById('price').value = '';
            } catch (error) {
                statusDiv.innerText = '傳送出錯，請檢查設定。';
                statusDiv.style.backgroundColor = '#f8d7da';
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
