<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據中樞 V2.5 Multi-Event</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #007aff; --bg: #000; --glass: rgba(255, 255, 255, 0.08); --border: 1px solid rgba(255,255,255,0.2); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 50px; }
        .nav { max-width: 1300px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; }
        .nav-item { cursor: pointer; padding: 10px 20px; border-radius: 10px; background: var(--glass); border: var(--border); font-size: 0.85rem; }
        .nav-item.active { background: var(--p); border-color: var(--p); }
        .dashboard { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 0 20px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; padding: 20px; border: var(--border); margin-bottom: 20px; }
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 0.85rem; }
        .bg-green { background: #34c759; color: #000; }
        .bg-orange { background: #ff9500; color: #000; }
        .bg-red { background: #ff3b30; color: #fff; }
        .chart-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: var(--border); margin-bottom: 30px; }
        .analysis-box { margin-top: 15px; padding: 15px; background: rgba(0,122,255,0.05); border-radius: 12px; font-size: 0.85rem; line-height: 1.6; border-left: 5px solid var(--p); color: #ddd; }
        .egg-text { font-size: 0.75rem; color: #ffcc00; font-style: italic; margin-top: 5px; min-height: 18px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { padding: 10px 2px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 0.7rem; text-align: center; position: relative; }
        .cal-event { background: #ffcc00; color: #000; font-weight: bold; border: 1px solid #fff; }
        .cal-rest { background: #ff3b30; color: #fff; }
        input, textarea { background: rgba(255,255,255,0.1); border: var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .val-tag { color: var(--p); font-weight: bold; }
        .ai-btn { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 16px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-item active" onclick="switchTab('main')">📈 數據診斷與趨勢</div>
    <div class="nav-item" onclick="switchTab('sets')">⚙️ 系統設定</div>
</div>

<div id="tab-main" class="dashboard">
    <div class="left-col">
        <div class="card" style="border: 2px solid rgba(255,255,255,0.1);">
            <h3 style="margin-top:0;">🚀 營運模擬核心</h3>
            <div style="padding:15px; background:rgba(255,255,255,0.03); border-radius:15px; border:var(--border);">
                <label style="font-size:0.75rem; color:#888;">小時人流模擬</label>
                <input type="range" id="flowIn" min="0" max="200" value="80" oninput="updateAll()">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <span style="font-size:2rem; font-weight:900;" id="flowNum">80</span>
                    <span id="flowStatus" class="status-pill">載入中</span>
                </div>
                <div id="easterEgg" class="egg-text"></div>
            </div>
            <p style="font-size:0.75rem; color:#666; margin:15px 0 5px;">📍 想追問 AI 的特定問題：</p>
            <textarea id="aiQuest" rows="3" placeholder="例如：我想喺演唱會期間增加外賣員人手，可行嗎？"></textarea>
            <button class="ai-btn" onclick="openAI()">📋 獲取診斷指令</button>
        </div>

        <div class="card" style="border: 1px solid rgba(255,59,48,0.3);">
            <div style="font-size:0.9rem; font-weight:bold;">🗓️ 多場演唱會 & 休息安排</div>
            <div id="calWhy" style="font-size:0.75rem; color:var(--p); margin:10px 0;"></div>
            <div class="cal-grid" id="calGrid"></div>
            <div style="font-size:0.6rem; margin-top:10px; color:#888;">🟡: 演唱會期間 (共 <span id="eventCount">0</span> 日) | 🔴: 建議休息</div>
        </div>
    </div>

    <div class="right-col">
        <div class="chart-box">
            <div style="height:320px;"><canvas id="cGlobal"></canvas></div>
            <div class="analysis-box" id="anaGlobal"></div>
        </div>
        <div class="chart-box">
            <div style="height:250px;"><canvas id="c1"></canvas></div>
            <div class="analysis-box" id="ana1"></div>
        </div>
        <div class="chart-box">
            <div style="height:250px;"><canvas id="c2"></canvas></div>
            <div class="analysis-box" id="ana2"></div>
        </div>
        <div class="chart-box">
            <div style="height:250px;"><canvas id="c6"></canvas></div>
            <div class="analysis-box" id="ana6"></div>
        </div>
    </div>
</div>

<div id="tab-sets" class="dashboard hidden">
    <div class="card" style="grid-column: span 2;">
        <h3>⚙️ 全局數據與事件設定</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
            <div>
                <label>平均每日收入 (基準): <span class="val-tag" id="v_target"></span></label>
                <input type="range" id="dailyRev" min="5000" max="100000" step="1000" value="30000" oninput="updateAll()">
                <label>每日固定成本: <span class="val-tag" id="v_fixed"></span></label>
                <input type="range" id="dailyFixed" min="1000" max="25000" step="500" value="8500" oninput="updateAll()">
                <label>外賣佔比 (%): <span class="val-tag" id="v_deliv"></span></label>
                <input type="range" id="delivRate" min="0" max="80" value="25" oninput="updateAll()">
                <label>外賣平台抽成 (%): <span class="val-tag" id="v_fee"></span></label>
                <input type="range" id="delivFee" min="20" max="40" value="30" oninput="updateAll()">
            </div>
            <div>
                <p style="color:#ffcc00; font-weight:bold;">🎤 演唱會日程表</p>
                <label>活動日期 (如 1,2,3,15,16,17):</label>
                <input type="text" id="eventDays" value="1,2,3,15,16,17" oninput="updateAll()">
                <label>演唱會/活動描述:</label>
                <textarea id="concertNames" rows="3">1-3號: 周杰倫; 15-17號: 陳奕迅</textarea>
                <p style="font-size:0.7rem; color:#666;">* 輸入日期後日曆會即時更新。</p>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(t) {
        document.getElementById('tab-main').classList.toggle('hidden', t!=='main');
        document.getElementById('tab-sets').classList.toggle('hidden', t!=='sets');
        document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.innerText.includes(t==='main'?'📈':'系統')));
    }

    const chartOpt = (t, isLegend=false) => ({
        responsive:true, maintainAspectRatio:false,
        plugins:{ title:{ display:true, text:t, color:'#fff', font:{size:16, weight:'bold'} }, legend:{display:isLegend, labels:{color:'#888', font:{size:10}}} },
        scales:{ x:{ ticks:{color:'#888', font:{size:10}} }, y:{ ticks:{color:'#888', font:{size:10}}, grid:{color:'rgba(255,255,255,0.05)'} } }
    });

    const cGlobal = new Chart(document.getElementById('cGlobal'), { type:'line', data:{ labels:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets:[{ label:'預估每月純利 ($)', data:[], borderColor:'#34c759', tension:0.4, fill:false },{ label:'年度累積預測 ($)', data:[], borderColor:'#007aff', tension:0.4, fill:true, backgroundColor:'rgba(0,122,255,0.1)', yAxisID:'y1' }] }, options:chartOpt('動態盈虧趨勢預測', true) });
    cGlobal.options.scales.y1 = { position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#007aff'} };

    const c1 = new Chart(document.getElementById('c1'), { type:'line', data:{ labels:['10:30','13:00','15:30','18:00','20:30','22:30'], datasets:[{ data:[], borderColor:'#007aff', fill:true, backgroundColor:'rgba(0,122,255,0.1)', tension:0.4 }] }, options:chartOpt('24小時人流分布壓力') });
    const c2 = new Chart(document.getElementById('c2'), { type:'line', data:{ labels:['10:30','13:00','15:30','18:00','20:30','22:30'], datasets:[{ data:[], borderColor:'#af52de', tension:0.4 }] }, options:chartOpt('即時翻枱效率') });
    const c6 = new Chart(document.getElementById('c6'), { type:'bar', data:{ labels:['今日營收','固定成本','外賣抽成','預估純利'], datasets:[{ data:[], backgroundColor:['#34c759','#8e8e93','#ff3b30','#007aff'] }] }, options:chartOpt('今日盈虧即時分析') });

    function updateAll() {
        const flow = parseInt(document.getElementById('flowIn').value);
        const dailyRev = parseInt(document.getElementById('dailyRev').value);
        const fixed = parseInt(document.getElementById('dailyFixed').value);
        const delivR = parseInt(document.getElementById('delivRate').value) / 100;
        const delivF = parseInt(document.getElementById('delivFee').value) / 100;
        const eDaysRaw = document.getElementById('eventDays').value;
        const eDays = eDaysRaw.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));
        const cDesc = document.getElementById('concertNames').value;

        document.getElementById('flowNum').innerText = flow;
        document.getElementById('v_target').innerText = '$' + dailyRev.toLocaleString();
        document.getElementById('v_fixed').innerText = '$' + fixed.toLocaleString();
        document.getElementById('v_deliv').innerText = (delivR*100) + '%';
        document.getElementById('v_fee').innerText = (delivF*100) + '%';
        document.getElementById('eventCount').innerText = eDays.length;

        // 彩蛋
        const egg = document.getElementById('easterEgg');
        egg.innerText = flow < 15 ? "店長拍緊烏蠅，烏蠅都話要移民。" : (flow > 180 ? "排隊排到去紅館，廚房火都熄唔到！" : "");

        const st = document.getElementById('flowStatus');
        if(flow < 45) { st.innerText="🔵 鬆動"; st.className="status-pill bg-green"; }
        else if(flow < 95) { st.innerText="🟡 理想"; st.className="status-pill bg-orange"; }
        else { st.innerText="🔴 飽和"; st.className="status-pill bg-red"; }

        // 運算
        const delivCost = dailyRev * delivR * delivF;
        const foodCost = dailyRev * 0.35;
        const dailyProfit = dailyRev - fixed - foodCost - delivCost;

        // 趨勢圖：波浪演算法
        const mBase = dailyProfit * 30;
        const wave = [0.8, 0.7, 1.1, 1.3, 0.9, 0.8, 1.2, 1.5, 0.95, 1.1, 1.3, 1.6];
        const mData = wave.map(f => mBase * f + (Math.random() - 0.5) * mBase * 0.1);
        let cum = 0; const cData = mData.map(v => { cum += v; return cum; });
        cGlobal.data.datasets[0].data = mData; 
        cGlobal.data.datasets[1].data = cData; 
        cGlobal.update();

        document.getElementById('anaGlobal').innerHTML = `
            <b>【解釋】</b>基於當前純利 \$${Math.round(dailyProfit)} 推算的年度盈利波段。<br>
            <b>【分析】</b>波浪反映市場旺淡市（如2月淡季，12月旺季）。預計年收利潤 \$${Math.round(cum).toLocaleString()}。<br>
            <b>【判斷】</b>${cum < 0 ? '<b>[警報]</b> 支出結構過重，年度預期虧損！' : '盈利能力健康，累積資產穩定向上。'}<br>
            <b>【改善】</b>建議將旺季利潤的 30% 留存，用作填補淡季的波谷位。
        `;

        const fData = [flow*0.4, flow*1.2, flow*0.6, flow*1.7, flow*1.1, flow*0.4];
        c1.data.datasets[0].data = fData; c1.update();
        document.getElementById('ana1').innerHTML = `<b>【分析】</b>小時人流最高達 ${Math.round(flow*1.7)} 人。<b>【判斷】</b>晚市壓力極大，需專人負責分流。`;

        const tData = fData.map(v=>(v/50).toFixed(1));
        c2.data.datasets[0].data = tData; c2.update();
        document.getElementById('ana2').innerHTML = `<b>【分析】</b>翻枱率峰值 ${Math.max(...tData)}x。<b>【判斷】</b>${Math.max(...tData)>1.2?'座位利用率極佳。':'座位閒置率高。'}`;

        c6.data.datasets[0].data = [dailyRev, fixed, delivCost, dailyProfit]; c6.update();
        document.getElementById('ana6').innerHTML = `<b>【分析】</b>外賣抽成佔每日 \$${Math.round(delivCost)}。<b>【改善】</b>外賣比重過高會侵蝕純利，應推廣堂食優惠。`;

        // 日曆
        const cal = document.getElementById('calGrid'); cal.innerHTML = '';
        for(let i=1; i<=30; i++) {
            const day = document.createElement('div');
            const isE = eDays.includes(i);
            const isR = !isE && (i % 7 === 2 || i % 7 === 3);
            day.className = 'cal-day' + (isE ? ' cal-event' : (isR ? ' cal-rest' : ''));
            day.innerText = i; cal.appendChild(day);
        }
        document.getElementById('calWhy').innerText = `本月演唱會：${cDesc}。🟡日子嚴禁請假。`;
    }

    function openAI() {
        const basePrompt = `【數據診斷報告】
- 日收基準: $${document.getElementById('dailyRev').value}
- 固定成本: $${document.getElementById('dailyFixed').value}
- 模擬人流: ${document.getElementById('flowIn').value}
- 外賣佔比: ${document.getElementById('delivRate').value}%
- 診斷分析：翻枱率與純利表現。
- 可能做錯的地方：${document.getElementById('dailyFixed').value > 15000 ? '固定支出過高' : '外賣抽成侵蝕利潤'}。
--------------------------
【追問特定問題】:
${document.getElementById('aiQuest').value || '請根據以上數據提供營運優化建議。'}`;
        
        navigator.clipboard.writeText(basePrompt).then(() => {
            alert("診斷指令已複製！即將跳轉 Gemini。");
            window.open("https://gemini.google.com/app", "_blank");
        });
    }
    updateAll();
</script>
</body>
</html>
