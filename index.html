<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡餐飲 AI 診斷 v2.4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2563eb; --s: #059669; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        
        /* 版本號碼顯示 */
        .version-tag { 
            position: fixed; top: 10px; left: 15px; 
            font-size: 0.65rem; color: #94a3b8; font-weight: bold; 
            z-index: 100; pointer-events: none; letter-spacing: 0.5px;
        }

        .grid { max-width: 800px; margin: 40px auto auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .full { grid-column: span 2; }
        h2 { font-size: 1rem; color: var(--p); margin: 0 0 15px 0; display: flex; justify-content: space-between; }
        
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        .val-display { font-weight: bold; color: var(--p); font-size: 1.2rem; }
        
        .insights { display: flex; gap: 10px; margin-top: 10px; }
        .insight-tag { flex: 1; background: #eff6ff; padding: 10px; border-radius: 8px; font-size: 0.8rem; border: 1px solid #dbeafe; }
        
        #promptBox { background: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 0.9rem; color: #334155; border-left: 4px solid var(--s); line-height: 1.4; }
        button { width: 100%; padding: 12px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; margin-top: 5px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; margin-top: 30px; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="version-tag">STAGING v2.4.0 (BETA)</div>

<div class="grid">
    <div class="card">
        <h2>📊 數據模擬 <span class="val-display" id="flowVal">100</span>人</h2>
        <label>人流預測</label>
        <input type="range" id="flow" min="10" max="500" value="100" oninput="updateAll()">
        
        <label>營運壓力 (1-10)</label>
        <input type="range" id="stress" min="1" max="10" value="5" oninput="updateAll()">
        
        <label>時段選擇</label>
        <select id="time" onchange="updateAll()">
            <option>早餐時段 (07-11)</option>
            <option>午餐高峰 (12-14)</option>
            <option>下午茶時段 (15-17)</option>
            <option>晚市繁忙 (18-22)</option>
        </select>
    </div>

    <div class="card">
        <h2>📈 人流趨勢預測</h2>
        <div style="height: 120px;"><canvas id="chart"></canvas></div>
    </div>

    <div class="card full">
        <h2>⚡ 即時診斷與準備事項</h2>
        <div class="insights">
            <div class="insight-tag"><b>🚨 致命傷：</b><br><span id="risk">-</span></div>
            <div class="insight-tag"><b>🛠️ 準備位：</b><br><span id="prep">-</span></div>
            <div class="insight-tag"><b>💡 考慮點：</b><br><span id="think">-</span></div>
        </div>
    </div>

    <div class="card full">
        <h2>📋 50字內 AI 精華指令</h2>
        <div id="promptBox">正在生成最佳指令...</div>
        <button onclick="copyPrompt()">📋 一鍵複製並問 Gemini</button>
    </div>
</div>

<script>
    const ctx = document.getElementById('chart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { labels: ['前', '現', '後'], datasets: [{ label: '人流', data: [80, 100, 120], borderColor: '#2563eb', tension: 0.4, fill: true, backgroundColor: 'rgba(37, 99, 235, 0.1)' }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
    });

    function updateAll() {
        const flow = parseInt(document.getElementById('flow').value);
        const stress = parseInt(document.getElementById('stress').value);
        const time = document.getElementById('time').value;
        
        document.getElementById('flowVal').innerText = flow;

        // 更新圖表
        chart.data.datasets[0].data = [flow * 0.8, flow, flow * 1.3];
        chart.update();

        // 簡潔診斷邏輯
        let riskText = flow > 300 ? "廚房壓力崩潰" : (stress > 7 ? "前線人力不足" : "翻台速度緩慢");
        let prepText = flow > 300 ? "啟動外賣限流" : "預製熱銷菜品";
        let thinkText = stress > 8 ? "考慮暫停堂食" : "優化點餐流程";
        
        document.getElementById('risk').innerText = riskText;
        document.getElementById('prep').innerText = prepText;
        document.getElementById('think').innerText = thinkText;

        // 生成 50 字精華 Prompt
        const shortPrompt = `我是餐廳顧問。數據：${time}、${flow}人、壓力${stress}/10。請用30字給出最致命風險及一個反敗為勝策略。`;
        document.getElementById('promptBox').innerText = shortPrompt;
    }

    function copyPrompt() {
        const text = document.getElementById('promptBox').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("指令已複製！\n請貼到 Gemini / ChatGPT 獲取專業建議。");
        });
    }

    updateAll();
</script>

</body>
</html>
