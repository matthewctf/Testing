<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳人流 AI 預測模擬器 - Pro 版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.25rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #aiOutput { background: #f1f5f9; padding: 15px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; margin-top: 10px; border-left: 4px solid var(--primary); }
        .chart-container { position: relative; height: 250px; width: 100%; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>📊 模擬器控制台</h2>
        <div class="input-group">
            <label>模擬時段</label>
            <select id="timeSlot">
                <option value="早餐">早餐 (07-11)</option>
                <option value="午餐高峰">午餐高峰 (12-14)</option>
                <option value="下午茶">下午茶 (15-17)</option>
                <option value="晚餐高峰">晚餐高峰 (18-21)</option>
            </select>
        </div>
        <div class="input-group">
            <label>外部因素 (天氣/活動)</label>
            <input type="text" id="factors" placeholder="例如：颱風、外賣8折、附近演唱會">
        </div>
        <div class="input-group">
            <label>基礎人流設定</label>
            <input type="number" id="baseFlow" value="50">
        </div>
        <button onclick="runSimulation()">執行模擬 & 同步數據</button>
    </div>

    <div class="card">
        <h2>📈 即時人流趨勢預測</h2>
        <div class="chart-container">
            <canvas id="flowChart"></canvas>
        </div>
    </div>

    <div class="card" style="grid-column: span 2;">
        <h2>🤖 AI 即時分析中心 (尖銳意見/解決方案)</h2>
        <div id="aiOutput">等待數據輸入中... AI 將會針對你的場景提出尖銳挑戰及對策。</div>
        
        <div class="input-group" style="margin-top: 20px;">
            <label>直接向 AI 提問：</label>
            <textarea id="aiQuestion" rows="2" placeholder="問 AI 關於呢個模擬場景嘅問題..."></textarea>
        </div>
        <button onclick="askAI()" style="background: #059669;">發送尖銳問題</button>
    </div>
</div>

<script>
    // ⚠️ 請換成你自己的 Google Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwY1fu9g3om-VhxdKcGxuEne-pgGZQkndDlqH1bifgaZ1_McT8xtkbKmKVuyau823wT6g/exec';

    // 初始化圖表
    const ctx = document.getElementById('flowChart').getContext('2d');
    let flowChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['1小時前', '現在', '預測1hr後', '預測2hr後'],
            datasets: [{ label: '人流量', data: [30, 50, 0, 0], borderColor: '#2563eb', fill: true, backgroundColor: 'rgba(37,99,235,0.1)' }]
        },
        options: { maintainAspectRatio: false }
    });

    async function runSimulation() {
        const data = {
            timeSlot: document.getElementById('timeSlot').value,
            factors: document.getElementById('factors').value,
            baseFlow: document.getElementById('baseFlow').value,
            type: "simulate"
        };

        // 更新圖表預測 (模擬前端即時反應)
        let prediction = Math.round(data.baseFlow * (1 + (Math.random() * 0.5)));
        flowChart.data.datasets[0].data = [Math.random()*40, data.baseFlow, prediction, prediction * 1.2];
        flowChart.update();

        document.getElementById('aiOutput').innerText = "AI 正在進行深度分析與挑剔中...";
        sendToGAS(data);
    }

    async function askAI() {
        const question = document.getElementById('aiQuestion').value;
        if(!question) return;
        document.getElementById('aiOutput').innerText = "AI 正在針對你的問題撰寫解決方案...";
        sendToGAS({ question: question, type: "ask" });
    }

    async function sendToGAS(payload) {
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("數據已同步至雲端，請檢查 Google Sheet 查看最新 AI 報告。");
        } catch (e) {
            console.error(e);
        }
    }
</script>
</body>
</html>
