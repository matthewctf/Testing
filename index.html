<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐飲營運 AI 診斷 V1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #007aff; --s: #34c759; --bg: #f5f5f7; --card-bg: rgba(255,255,255,0.8); }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro HK", sans-serif; background: var(--bg); padding: 20px; margin: 0; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
        
        /* Apple 風格版本號 */
        .v-tag { position: fixed; top: 15px; left: 20px; font-size: 11px; color: rgba(0,0,0,0.3); font-weight: 600; z-index: 100; letter-spacing: 1px; }

        .grid { max-width: 1100px; margin: 50px auto auto; display: grid; grid-template-columns: 2fr 3fr; gap: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.3); transition: 0.3s; }
        .card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .full { grid-column: span 2; }
        
        h2 { font-size: 1.1rem; font-weight: 600; color: #000; margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* 控制區域 */
        .ctrl-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: #86868b; margin-bottom: 8px; }
        input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: #e0e0e2; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; background: var(--p); border-radius: 50%; margin-top: -7px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 2px solid white; transition: 0.2s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.1); }
        
        select { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; background: white; font-size: 1rem; -webkit-appearance: none; }

        /* 流動數字 (Ticker) */
        .ticker { font-size: 2.2rem; font-weight: 700; color: var(--p); letter-spacing: -1px; transition: 0.5s ease-out; display: inline-block; }
        
        /* 圖表區域 */
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e5e5e7; height: 180px; position: relative; }
        
        /* 診斷與指令 */
        #risk { color: #ff3b30; font-weight: bold; }
        #promptBox { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 12px; font-size: 0.9rem; color: #515154; border-left: 4px solid var(--s); line-height: 1.5; margin-top: 15px; }
        button { width: 100%; padding: 16px; background: var(--s); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* 手機適配 */
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; margin-top: 40px; } .charts-container { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="v-tag">VERSION V1.0.0</div>

<div class="grid">
    <div class="card">
        <h2>📊 數據模擬中心</h2>
        
        <div class="ctrl-group">
            <label>預計時段</label>
            <select id="time" onchange="updateAll()">
                <option value="breakfast">早餐市 (07:00-11:00)</option>
                <option value="lunch" selected>午餐高峰 (12:00-14:30)</option>
                <option value="tea">下午茶 (15:00-17:30)</option>
                <option value="dinner">晚市繁忙 (18:30-22:00)</option>
            </select>
        </div>

        <div class="ctrl-group">
            <label>人流模擬</label>
            <div class="ticker" id="flowVal">0</div><span style="color:var(--p); font-weight:bold; margin-left:5px;">人</span>
            <input type="range" id="flow" min="20" max="500" value="150" oninput="animateNumber('flowVal', this.value); updateCharts();">
        </div>
        
        <div class="ctrl-group">
            <label>現場壓力值</label>
            <div class="ticker" id="stressVal">0</div><span style="color:var(--p); font-weight:bold; margin-left:5px;">/10</span>
            <input type="range" id="stress" min="1" max="10" value="6" oninput="animateNumber('stressVal', this.value); updateCharts();">
        </div>
    </div>

    <div class="card full">
        <h2>📈 營運即時看板 (互動式)</h2>
        <div class="charts-container">
            <div class="chart-box">
                <canvas id="waveChart"></canvas>
            </div>
            <div style="display:grid; grid-template-rows: 1fr 1fr; gap:10px;">
                <div class="chart-box" style="height:85px;"><canvas id="gaugeChart"></canvas></div>
                <div class="chart-box" style="height:85px;"><canvas id="donutChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="card full">
        <h2>📋 50字內 AI 精華指令</h2>
        <div id="promptBox">正在根據波動數據生成最佳指令...</div>
        <button onclick="copyPrompt()">📋 一鍵複製並問 Gemini</button>
    </div>
</div>

<script>
    // 1. 初始化圖表 (設定 Apple 風格)
    Chart.defaults.font.family = '-apple-system, sans-serif';
    Chart.defaults.color = '#86868b';

    // 圖表 1: 波動型人流圖
    const waveCtx = document.getElementById('waveChart').getContext('2d');
    const waveGradient = waveCtx.createLinearGradient(0, 0, 0, 180);
    waveGradient.addColorStop(0, 'rgba(0, 122, 255, 0.3)');
    waveGradient.addColorStop(1, 'rgba(0, 122, 255, 0)');

    let waveChart = new Chart(waveCtx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: '即時人流', data: [], borderColor: '#007aff', borderWidth: 3, pointBackgroundColor: '#fff', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 7, fill: true, backgroundColor: waveGradient, tension: 0.4 }] },
        options: { 
            maintainAspectRatio: false, 
            plugins: { legend: { display: false }, tooltip: { enabled: false } }, // 禁用預設 Tooltip，使用自定義
            scales: { y: { beginAtZero: true, grid: { color: '#f0f0f2' } }, x: { grid: { display: false } } },
            onClick: (e, items) => { if(items.length > 0) showTooltip(items[0]); } // 撳圖表觸發彈窗
        }
    });

    // 圖表 2: 壓力盤
    let gaugeChart = new Chart(document.getElementById('gaugeChart'), {
        type: 'doughnut',
        data: { datasets: [{ data: [60, 40], backgroundColor: ['#ff3b30', '#e5e5e7'], borderRange: 0, circumference: 180, rotation: 270 }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '80%' }
    });

    // 圖表 3: 翻台率
    let donutChart = new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: { labels: ['已翻台', '待翻台'], datasets: [{ data: [70, 30], backgroundColor: ['#34c759', '#e5e5e7'] }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // 2. 數據波動邏輯與圖表更新
    function updateCharts() {
        const flow = parseInt(document.getElementById('flow').value);
        const time = document.getElementById('time').value;
        const stress = document.getElementById('stress').value;

        // 生成真實時間波動數據
        let labels = [], data = [];
        let baseTime, peaks;

        if(time === 'lunch') { baseTime = 12; peaks = [12.5, 13.0]; labels = ['12:00', '12:30', '13:00', '13:30', '14:00']; }
        else if(time === 'dinner') { baseTime = 18; peaks = [19.0, 20.0]; labels = ['18:30', '19:00', '19:30', '20:00', '20:30', '21:00']; }
        else { baseTime = 8; peaks = [9.0]; labels = ['08:00', '08:30', '09:00', '09:30', '10:00']; }

        // 生成波動曲線 (根據高峰時間)
        labels.forEach((t, i) => {
            let hour = baseTime + i*0.5;
            let multiplier = 1 + 0.3 * Math.sin(i * 1.5); // 基礎波動
            peaks.forEach(p => { if(Math.abs(hour - p) < 0.6) multiplier += 0.4; }); // 加強高峰
            data.push(Math.round(flow * multiplier * (1 + (Math.random()-0.5)*0.1))); // 加入隨機噪點
        });

        // 更新人流圖
        waveChart.data.labels = labels;
        waveChart.data.datasets[0].data = data;
        waveChart.update('active');

        // 更新壓力盤與翻台圖
        gaugeChart.data.datasets[0].data = [stress*10, 100-stress*10];
        gaugeChart.update();

        let turnRate = Math.max(10, 90 - (flow/50)*10);
        donutChart.data.datasets[0].data = [turnRate, 100-turnRate];
        donutChart.update();

        // 更新精華 Prompt
        const shortPrompt = `我是餐廳顧問。數據：${labels[0]}-${labels[labels.length-1]}時段、波動人數${flow}、壓力${stress}/10。請用30字給出最致命風險及一個反敗為勝策略。`;
        document.getElementById('promptBox').innerText = shortPrompt;
    }

    // 3. Apple 風格數字流動動畫
    function animateNumber(id, finalValue) {
        const el = document.getElementById(id);
        const startValue = parseInt(el.innerText);
        if(startValue === finalValue) return;
        
        let duration = 300; // 動畫時長 (毫秒)
        let startTime = null;

        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            let progress = timestamp - startTime;
            let current = Math.round(startValue + (finalValue - startValue) * (progress / duration));
            el.innerText = current;
            if (progress < duration) {
                window.requestAnimationFrame(step);
            } else {
                el.innerText = finalValue; // 確保最後數值準確
            }
        }
        window.requestAnimationFrame(step);
    }

    // 4. 自定義圖表彈窗 (Tooltip)
    function showTooltip(item) {
        const index = item.index;
        const time = waveChart.data.labels[index];
        const count = waveChart.data.datasets[0].data[index];
        
        // 簡單嘅營運建議邏輯
        let advice = count > 200 ? "🚨 建議外賣限流，確保堂食" : "🛠️ 檢查預製菜存量，準備高峰";

        // 用 alert 模擬 Apple 風格彈窗 (正式版可以用自定義 DIV)
        alert(`⏰ 時間：${time}\n📊 人數：${count} 人\n💡 建議：${advice}`);
    }

    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('promptBox').innerText).then(() => {
            alert("✅ 指令已複製！請貼到 Gemini。");
        });
    }

    // 5. 初始化
    function updateAll() {
        animateNumber('flowVal', document.getElementById('flow').value);
        animateNumber('stressVal', document.getElementById('stress').value);
        updateCharts();
    }
    updateAll();

</script>

</body>
</html>
