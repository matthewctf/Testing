<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡餐飲 AI 診斷</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2563eb; --s: #059669; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .grid { max-width: 800px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .full { grid-column: span 2; }
        h2 { font-size: 1rem; color: var(--p); margin: 0 0 15px 0; display: flex; justify-content: space-between; }
        
        /* 滑動條樣式 */
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        .val-display { font-weight: bold; color: var(--p); font-size: 1.2rem; }
        
        /* 準備地方與分析 */
        .insights { display: flex; gap: 10px; margin-top: 10px; }
        .insight-tag { flex: 1; background: #eff6ff; padding: 10px; border-radius: 8px; font-size: 0.8rem; border: 1px solid #dbeafe; }
        
        /* 50字內精華 Prompt */
        #promptBox { background: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 0.9rem; color: #334155; border-left: 4px solid var(--s); line-height: 1.4; min-height: 40px; }
        button { width: 100%; padding: 12px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>📊 數據模擬 <span class="val-display" id="flowVal">100</span>人</h2>
        <label>人流預測</label>
        <input type="range" id="flow" min="10" max="300" value="100" oninput="updateAll()">
        
        <label>營運壓力 (1-10)</label>
        <input type="range" id="stress" min="1" max="10" value="5" oninput="updateAll()">
        
        <select id="time" onchange="updateAll()" style="margin-top:10px; width:100%; padding:8px; border-radius:5px;">
            <option>早餐時段</option><option>午餐高峰</option><option>晚市繁忙</option>
        </select>
    </div>

    <div class="card">
        <h2>📈 人流趨勢預測</h2>
        <div style="height: 120px;"><canvas id="chart"></canvas></div>
    </div>

    <div class="card full">
        <h2>⚡ 即時診斷與準備事項</h2>
        <div class="insights">
            <div class="insight-tag"><b>🚨 致命傷：</b><br><span id="risk">計算中...</span></div>
            <div class="insight-tag"><b>🛠️ 準備位：</b><br><span id="prep">計算中...</span></div>
            <div class="insight-tag"><b>💡 考慮點：</b><br><span id="think">計算中...</span></div>
        </div>
    </div>

    <div class="card full">
        <h2>📋 50字 AI 精華指令</h2>
        <div id="promptBox">請移動滑桿生成指令...</div>
        <button onclick="copyPrompt()">📋 一鍵複製並問 Gemini</button>
    </div>
</div>

<script>
    const ctx = document.getElementById('chart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { labels: ['前', '現', '後'], datasets: [{ label: '人流', data: [80, 100, 120], borderColor: '#2563eb', tension: 0.4 }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    function updateAll() {
        const flow = document.getElementById('flow').value;
        const stress = document.getElementById('stress').value;
        const time = document.getElementById('time').value;
        
        document.getElementById('flowVal').innerText = flow;

        // 1. 更新圖表
        chart.data.datasets[0].data = [flow * 0.7, flow, flow * 1.2];
        chart.update();

        // 2. 即時動態分析邏輯
        const riskText = flow > 200 ? "出餐癱瘓" : (stress > 7 ? "員工崩潰" : "食材損耗");
        const prepText = flow > 200 ? "增加2人手" : "檢查預製菜";
        const thinkText = "考慮翻台率是否過低";
        
        document.getElementById('risk').innerText = riskText;
        document.getElementById('prep').innerText = prepText;
        document.getElementById('think').innerText = thinkText;

        // 3. 生成 50 字精華 Prompt
        const shortPrompt = `我是餐廳顧問。數據：${time}、${flow}人、壓力${stress}/10。請用30字給出最致命風險及一個反敗為勝策略。`;
        document.getElementById('promptBox').innerText = shortPrompt;
    }

    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('promptBox').innerText);
        alert("指令已複製！請貼到 Gemini。");
    }

    updateAll(); // 初始化
</script>

</body>
</html>
