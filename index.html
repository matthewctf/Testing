<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳人流 AI 預測模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .grid { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .full { grid-column: span 2; }
        h2 { font-size: 1rem; color: var(--accent); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 8px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #aiBox { margin-top: 15px; padding: 15px; background: #f1f5f9; border-left: 4px solid var(--accent); min-height: 80px; white-space: pre-wrap; font-size: 0.9rem; }
        .chart-wrap { height: 220px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>📊 數據輸入</h2>
        <div class="input-group">
            <label>時段</label>
            <select id="time"><option>早餐</option><option>午餐</option><option>下午茶</option><option>晚餐</option></select>
        </div>
        <div class="input-group">
            <label>外部因素</label>
            <input type="text" id="factors" placeholder="例如：落大雨、新店開張">
        </div>
        <div class="input-group">
            <label>預計人流</label>
            <input type="number" id="base" value="80">
        </div>
        <button onclick="run()">執行模擬</button>
    </div>

    <div class="card">
        <h2>📈 即時圖表</h2>
        <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    </div>

    <div class="card full">
        <h2>🤖 AI 尖銳意見 & 即時分享區</h2>
        <div id="aiBox">等待指令...</div>
        <textarea id="ask" rows="2" style="margin-top:15px" placeholder="追問 AI 解決方案..."></textarea>
        <button onclick="askAI()" style="background:#059669">獲取 AI 解決方案</button>
    </div>
</div>

<script>
    // ⚠️ 記得喺下面貼返你部署後嗰條 Web App URL
    const URL = 'https://script.google.com/macros/s/AKfycbzEuVpIhXA4mTj7hlZys7Zf5Ik8-MCPEWpt9QMSiBlFJwwKvfVLKflfZYL8geeZgC_2DQ/exec';

    const ctx = document.getElementById('myChart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { labels: ['-1h', '現在', '+1h', '+2h'], datasets: [{ label: '模擬人流', data: [0,0,0,0], borderColor: '#2563eb', tension: 0.3 }] },
        options: { maintainAspectRatio: false }
    });

    async function run() {
        const val = document.getElementById('base').value;
        chart.data.datasets[0].data = [val*0.7, val, val*1.4, val*1.2];
        chart.update();
        call({ type: "simulate", timeSlot: document.getElementById('time').value, factors: document.getElementById('factors').value, baseFlow: val });
    }

    async function askAI() {
        const q = document.getElementById('ask').value;
        if(q) call({ type: "ask", question: q });
    }

    async function call(payload) {
        document.getElementById('aiBox').innerText = "AI 正在思考中...";
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('aiBox').innerHTML = "✅ <b>數據已同步！</b><br>由於瀏覽器安全限制，請即時查看 <b>Google Sheet</b> 獲取 AI 的尖銳報告。";
        } catch (e) { alert("出錯，請檢查 URL"); }
    }
</script>
</body>
</html>
