<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳營運 AI 診斷助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f1f5f9; }
        body { font-family: 'PingFang HK', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin-top: 0; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin: 10px 0 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #1d4ed8; }
        .btn-copy { background: var(--secondary); color: white; display: none; }
        #promptDisplay { 
            background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 12px; 
            margin-top: 20px; white-space: pre-wrap; display: none; font-size: 0.95rem; line-height: 1.6;
        }
        .badge { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📊 營運數據輸入</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>模擬時段</label>
                <select id="timeSlot">
                    <option>早市 (07:00-11:00)</option>
                    <option>午市 (12:00-14:30)</option>
                    <option>下午茶 (15:00-17:30)</option>
                    <option>晚市 (18:30-22:00)</option>
                </select>
            </div>
            <div>
                <label>預計人流 (人)</label>
                <input type="number" id="baseFlow" value="100">
            </div>
        </div>
        
        <label>當前外部因素 (如天氣、活動、修路)</label>
        <input type="text" id="factors" placeholder="例如：黃色暴雨警告、對面商場開張">
        
        <label>你有特別想問 AI 的問題嗎？ (可選)</label>
        <textarea id="customQuestion" rows="2" placeholder="例如：我想知道如何減少這段時間的食材浪費..."></textarea>
        
        <button class="btn-main" onclick="generateDiagnostic()">✨ 生成專業 AI 診斷指令</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <h2>🤖 已準備好診斷指令 <span class="badge">Step 2: 複製並貼上</span></h2>
        <div id="promptDisplay"></div>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">📋 點擊複製指令 (然後去 Gemini)</button>
        <p style="text-align:center; font-size:0.85rem; color:#64748b; margin-top:15px;">
            複製後請前往 <a href="https://gemini.google.com" target="_blank" style="color:var(--primary)">Gemini</a> 或 <a href="https://chatgpt.com" target="_blank" style="color:var(--primary)">ChatGPT</a> 貼上即可。
        </p>
    </div>
</div>

<script>
    function generateDiagnostic() {
        const time = document.getElementById('timeSlot').value;
        const flow = document.getElementById('baseFlow').value;
        const factors = document.getElementById('factors').value || "常規營運狀態";
        const question = document.getElementById('customQuestion').value;

        // 動態組裝全新的專業 Prompt
        let prompt = `你現在是一位專精於餐飲數據分析與現場調度的「毒舌營運顧問」。\n\n`;
        prompt += `【當前營運場景數據】\n`;
        prompt += `- 經營時段：${time}\n`;
        prompt += `- 預期人流：${flow} 人次\n`;
        prompt += `- 關鍵外部變數：${factors}\n\n`;
        
        prompt += `【你的任務】\n`;
        prompt += `1. **深度風險評估**：針對上述時段與因素，指出三個最可能導致虧損或客訴的致命隱患。\n`;
        prompt += `2. **應對策略**：提供一個具體、可立即執行的「反敗為勝」營運方案。\n`;
        prompt += `3. **翻台率預測**：根據 ${flow} 人的流量，分析這對餐廳的出餐壓力與周轉率有何影響。\n`;

        if (question) {
            prompt += `\n【用戶特別追問】\n針對以下問題提供額外的精確建議：${question}\n`;
        }

        prompt += `\n請使用繁體中文，保持專業、尖銳且務實的語氣，不要給出廢話。`;

        // 顯示結果
        const display = document.getElementById('promptDisplay');
        display.innerText = prompt;
        display.style.display = 'block';
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
        
        // 自動捲動到底部
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyToClipboard() {
        const text = document.getElementById('promptDisplay').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 指令已成功複製！\n現在你可以直接去 Gemini 貼上詢問了。");
        }).catch(err => {
            alert("複製失敗，請手動全選複製。");
        });
    }
</script>

</body>
</html>
